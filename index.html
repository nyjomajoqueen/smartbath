<!DOCTYPE HTML>
<html>
<head>
  <title>SmartBath Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f4f4f4; }
    h1 { color: #333; }
    .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 10px; width: 300px; vertical-align: top; }
    .status { font-size: 24px; font-weight: bold; margin: 20px; min-height: 35px; }
    .btn { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn:hover { background: #2980b9; }
    .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Панель управления SmartBath</h1>
  
  <div class="card">
    <h3>Состояние системы</h3>
    <div id="status-text" class="status">Подключение...</div>
  </div>

  <div class="card">
    <h3>Температура воды</h3>
    <div id="temp-text" class="status" style="color: #2980b9;">--.- &deg;C</div>
  </div>

  <div style="margin-top: 20px;">
    <button id="reset-btn" class="btn" onclick="resetSystem()">Открыть воду (Сброс)</button>
  </div>

  <script>
    // Конфигурация базы данных Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyDvXE9Fkod5YTSEsSbGjY-Gxm_lC6qCuz8",
      databaseURL: "https://smartbath-7cde1-default-rtdb.firebaseio.com/"
    };
    
    // Инициализация Firebase
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const statusText = document.getElementById("status-text");
    const tempText = document.getElementById("temp-text");
    const resetBtn = document.getElementById("reset-btn");

    // Чтение данных из облака в реальном времени
    database.ref("smartbath").on("value", (snapshot) => {
      const data = snapshot.val();
      if (data) {
        // Обработка статусов системы
        if (data.status === "IDLE") {
          statusText.innerText = "Идет набор воды...";
          statusText.style.color = "#2ecc71";
          resetBtn.disabled = false;
        } else if (data.status === "WET_ALARM") {
          statusText.innerText = "ВНИМАНИЕ! Вода набралась!";
          statusText.style.color = "#e74c3c";
          resetBtn.disabled = false;
        } else if (data.status === "SHUT_OFF") {
          statusText.innerText = "КЛАПАН ЗАКРЫТ. Ванна готова!";
          statusText.style.color = "#7f8c8d";
          resetBtn.disabled = false;
        } else if (data.status === "RESET") {
          statusText.innerText = "Открытие клапана...";
          statusText.style.color = "#f39c12";
          resetBtn.disabled = true; // Блокируем кнопку на время обработки
        }
        
        // Обработка показаний температуры
        if (data.temp !== undefined && data.temp > -50.0 && data.temp < 100.0 && data.temp !== 0.0) {
          tempText.innerHTML = data.temp.toFixed(1) + " &deg;C";
        } else {
          tempText.innerHTML = "измеряется...";
        }
      }
    }, (error) => {
      console.error("Ошибка чтения данных из Firebase:", error);
      statusText.innerText = "Ошибка сети";
      statusText.style.color = "#e74c3c";
    });

    // Функция кнопки сброса (открытия воды)
    function resetSystem() {
      resetBtn.disabled = true;
      statusText.innerText = "Отправка команды...";
      statusText.style.color = "#f39c12";

      database.ref("smartbath").update({
        status: "RESET"
      }).then(() => {
        console.log("Команда RESET отправлена в Firebase.");
      }).catch((error) => {
        console.error("Ошибка при отправке команды:", error);
        alert("Не удалось отправить команду. Проверьте подключение к интернету.");
        resetBtn.disabled = false;
      });
    }
  </script>
</body>
</html>
