<!DOCTYPE HTML>
<html>
<head>
  <title>SmartBath Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f4f4f4; }
    h1 { color: #333; }
    .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 10px; width: 300px; vertical-align: top; }
    .status { font-size: 24px; font-weight: bold; margin: 20px; min-height: 35px; }
    .btn { background: #3498db; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; text-decoration: none; transition: background 0.2s; }
    .btn:hover { background: #2980b9; }
    .btn:disabled { background: #bdc3c7; cursor: not-allowed; }
  </style>
</head>
<body>
  <h1>Панель управления SmartBath</h1>
  
  <div class="card">
    <h3>Состояние системы</h3>
    <div id="status-text" class="status" style="color: #7f8c8d;">Проверка связи...</div>
  </div>

  <div class="card">
    <h3>Температура воды</h3>
    <div id="temp-text" class="status" style="color: #7f8c8d;">--.- &deg;C</div>
  </div>

  <div style="margin-top: 20px;">
    <button id="reset-btn" class="btn" onclick="resetSystem()" disabled>Открыть воду (Сброс)</button>
  </div>

  <script>
    // === НАСТРОЙКА ===
    // Впишите сюда IP-адрес Блока Б, который он получает в вашей домашней сети Wi-Fi:
    const DEVICE_IP = "192.168.1.100"; 
    // =================

    const firebaseConfig = {
      apiKey: "AIzaSyDvXE9Fkod5YTSEsSbGjY-Gxm_lC6qCuz8",
      databaseURL: "https://smartbath-7cde1-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const statusText = document.getElementById("status-text");
    const tempText = document.getElementById("temp-text");
    const resetBtn = document.getElementById("reset-btn");

    let lastDatabaseState = null;
    let isDeviceOnline = false;

    // Чтение данных из Firebase
    database.ref("smartbath").on("value", (snapshot) => {
      lastDatabaseState = snapshot.val();
      updateUI();
    });

    // Функция обновления интерфейса в зависимости от того, в сети ли платы
    function updateUI() {
      if (!isDeviceOnline) {
        statusText.innerText = "Устройства выключены";
        statusText.style.color = "#7f8c8d";
        tempText.innerHTML = "нет связи...";
        tempText.style.color = "#7f8c8d";
        resetBtn.disabled = true;
        return;
      }

      // Если платы в сети, показываем данные из базы
      if (lastDatabaseState) {
        resetBtn.disabled = false;
        
        if (lastDatabaseState.status === "IDLE" || lastDatabaseState.status === "RESET") {
          statusText.innerText = "Идет набор воды...";
          statusText.style.color = "#2ecc71";
        } else if (lastDatabaseState.status === "WET_ALARM") {
          statusText.innerText = "ВНИМАНИЕ! Вода набралась!";
          statusText.style.color = "#e74c3c";
        } else if (lastDatabaseState.status === "SHUT_OFF") {
          statusText.innerText = "КЛАПАН ЗАКРЫТ. Ванна готова!";
          statusText.style.color = "#7f8c8d";
        }
        
        if (lastDatabaseState.temp !== undefined && lastDatabaseState.temp > -50.0 && lastDatabaseState.temp < 100.0 && lastDatabaseState.temp !== 0.0) {
          tempText.innerHTML = lastDatabaseState.temp.toFixed(1) + " &deg;C";
          tempText.style.color = "#2980b9";
        } else {
          tempText.innerHTML = "измеряется...";
          tempText.style.color = "#7f8c8d";
        }
      }
    }

    // Функция проверки связи с Блоком Б по локальной сети
    function pingDevice() {
      // Пытаемся сделать быстрый запрос к Блоку Б
      fetch(`http://${DEVICE_IP}/water`, { mode: 'no-cors', cache: 'no-store' })
        .then(() => {
          if (!isDeviceOnline) {
            isDeviceOnline = true;
            updateUI();
          }
        })
        .catch(() => {
          if (isDeviceOnline || statusText.innerText === "Проверка связи...") {
            isDeviceOnline = false;
            updateUI();
          }
        });
    }

    // Запускаем постоянную проверку связи каждые 5 секунд
    setInterval(pingDevice, 5000);
    pingDevice(); // Первый запуск сразу

    function resetSystem() {
      database.ref("smartbath").update({
        status: "RESET"
      });
    }
  </script>
</body>
</html>
