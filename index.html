<!DOCTYPE HTML>
<html>
<head>
  <title>SmartBath Control Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="utf-8">
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; background: #f4f4f4; color: #2c3e50; }
    h1 { color: #333; }
    .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin: 10px; width: 300px; vertical-align: top; }
    .status { font-size: 24px; font-weight: bold; margin: 20px; min-height: 35px; }
    .btn-container { margin-top: 30px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
    .btn { color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 5px; cursor: pointer; text-decoration: none; transition: background 0.2s; width: 280px; font-weight: bold; }
    .btn-start { background: #2ecc71; }
    .btn-start:hover { background: #27ae60; }
    .btn-stop { background: #e74c3c; }
    .btn-stop:hover { background: #c0392b; }
    .btn-rest { background: #7f8c8d; }
    .btn-rest:hover { background: #95a5a6; }
  </style>
</head>
<body>
  <h1>Панель управления SmartBath</h1>
  
  <div class="card">
    <h3>Состояние системы</h3>
    <div id="status-text" class="status" style="color: #7f8c8d;">В покое</div>
  </div>

  <div class="card">
    <h3>Температура воды</h3>
    <div id="temp-text" class="status" style="color: #7f8c8d;">не измеряется</div>
  </div>

  <div class="btn-container">
    <button class="btn btn-start" onclick="startFilling()">Начало набора воды</button>
    <button class="btn btn-stop" onclick="stopFilling()">Прекратить подачу воды</button>
    <button class="btn btn-rest" onclick="setRestState()">Состояние покоя</button>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDvXE9Fkod5YTSEsSbGjY-Gxm_lC6qCuz8",
      databaseURL: "https://smartbath-7cde1-default-rtdb.firebaseio.com/"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const statusText = document.getElementById("status-text");
    const tempText = document.getElementById("temp-text");

    let lastDisplayedTemp = null; // Температура на экране
    let isStopModeActive = false; // Локальный флаг для кнопки прекращения подачи

    // Фильтр температуры (изменение >= 0.3°C)
    function processTemperature(newTemp) {
      if (newTemp === undefined || newTemp <= -50.0 || newTemp >= 100.0 || newTemp === 0.0) {
        return; 
      }

      if (lastDisplayedTemp === null) {
        lastDisplayedTemp = newTemp;
        tempText.innerHTML = lastDisplayedTemp.toFixed(1) + " &deg;C";
        tempText.style.color = "#2980b9";
      } else {
        const difference = Math.abs(newTemp - lastDisplayedTemp);
        if (difference >= 0.3) {
          lastDisplayedTemp = newTemp;
          tempText.innerHTML = lastDisplayedTemp.toFixed(1) + " &deg;C";
          tempText.style.color = "#2980b9";
        }
      }
    }

    // Слушатель базы данных
    database.ref("smartbath").on("value", (snapshot) => {
      const data = snapshot.val();
      if (data) {
        
        // 1. Идет набор воды (IDLE или RESET)
        if (data.status === "IDLE" || data.status === "RESET") {
          statusText.innerText = "Идет набор воды...";
          statusText.style.color = "#2ecc71";
          
          if (data.temp !== undefined) {
            processTemperature(data.temp);
          } else {
            tempText.innerText = "измеряется...";
            tempText.style.color = "#2980b9";
          }
        } 
        // 2. Сработал датчик на перелив (WET_ALARM)
        else if (data.status === "WET_ALARM") {
          statusText.innerText = "Набор воды прекращен";
          statusText.style.color = "#e74c3c";
          
          if (lastDisplayedTemp !== null) {
            tempText.innerHTML = lastDisplayedTemp.toFixed(1) + " &deg;C";
            tempText.style.color = "#2c3e50";
          } else if (data.temp !== undefined) {
            processTemperature(data.temp);
          } else {
            tempText.innerText = "не измеряется";
            tempText.style.color = "#7f8c8d";
          }
        } 
        // 3. Команда SHUT_OFF (кнопка Стоп или Покой)
        else if (data.status === "SHUT_OFF") {
          if (isStopModeActive) {
            // Если была нажата кнопка «Прекратить подачу воды»
            statusText.innerText = "Набор воды прекращен";
            statusText.style.color = "#e74c3c";
            
            if (lastDisplayedTemp !== null) {
              tempText.innerHTML = lastDisplayedTemp.toFixed(1) + " &deg;C";
              tempText.style.color = "#2c3e50";
            } else if (data.temp !== undefined) {
              processTemperature(data.temp);
            } else {
              tempText.innerText = "не измеряется";
              tempText.style.color = "#7f8c8d";
            }
          } else {
            // Если была нажата кнопка «Состояние покоя»
            statusText.innerText = "В покое";
            statusText.style.color = "#7f8c8d";
            tempText.innerText = "не измеряется";
            tempText.style.color = "#7f8c8d";
            lastDisplayedTemp = null;
          }
        }
        // 4. По умолчанию
        else {
          statusText.innerText = "В покое";
          statusText.style.color = "#7f8c8d";
          tempText.innerText = "не измеряется";
          tempText.style.color = "#7f8c8d";
          lastDisplayedTemp = null;
        }
      }
    });

    function startFilling() {
      lastDisplayedTemp = null; 
      isStopModeActive = false; // Сбрасываем локальный флаг остановки
      database.ref("smartbath").update({
        status: "RESET"
      });
    }

    function stopFilling() {
      isStopModeActive = true; // Активируем локальный флаг остановки
      database.ref("smartbath").update({
        status: "SHUT_OFF"
      });
    }

    function setRestState() {
      isStopModeActive = false; // Отключаем локальный флаг остановки
      database.ref("smartbath").update({
        status: "SHUT_OFF"
      });
    }
  </script>
</body>
</html>
