<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Смарт Ванна</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; text-align: center; padding: 20px; max-width: 500px; margin: 0 auto; }
        .window { background: white; border: 2px solid #bdc3c7; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        .title { font-size: 16px; font-weight: bold; color: #7f8c8d; margin-bottom: 10px; }
        .value { font-size: 22px; font-weight: bold; color: #2c3e50; }
        button { width: 100%; padding: 15px; margin-bottom: 15px; font-size: 18px; font-weight: bold; color: white; border: none; border-radius: 8px; cursor: pointer; }
        .btn-start { background: #2ecc71; }
        .btn-stop { background: #e74c3c; }
        .btn-idle { background: #3498db; }
    </style>
</head>
<body>

    <div class="window">
        <div class="title">1. Окно состояние системы</div>
        <div class="value" id="status-window">Загрузка...</div>
    </div>

    <div class="window">
        <div class="title">2. Окно температура воды</div>
        <div class="value" id="temp-window">--</div>
    </div>

    <button class="btn-start" onclick="setState('filling')">1. Начало набора воды</button>
    <button class="btn-stop" onclick="setState('stopped')">2. Прекратить подачу воды</button>
    <button class="btn-idle" onclick="setState('idle')">3. Состояние покоя</button>

    <script>
        const db = "https://smartbath-7cde1-default-rtdb.firebaseio.com";
        let currentState = "idle";

        function setState(state) {
            fetch(`${db}/system_state.json`, { method: 'PUT', body: JSON.stringify(state) })
                .then(() => updateUI());
        }

        function updateUI() {
            fetch(`${db}/system_state.json`).then(r => r.json()).then(state => {
                if (!state) state = "idle";
                currentState = state;
                
                let text = "В покое";
                if (state === "filling") text = "Начало набора воды";
                if (state === "filled") text = "Конец набора воды";
                if (state === "stopped") text = "Подача воды прекращена";
                document.getElementById('status-window').innerText = text;

                return fetch(`${db}/temperature.json`);
            }).then(r => r.json()).then(temp => {
                let tempWin = document.getElementById('temp-window');
                if (currentState === "idle") {
                    tempWin.innerText = "Температура не измеряется";
                } else {
                    tempWin.innerText = temp ? temp + " °C" : "Ожидание...";
                }
            });
        }

        setInterval(updateUI, 1000); // Обновление сайта раз в секунду
        updateUI();
    </script>
</body>
</html>
